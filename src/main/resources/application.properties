spring.application.name=user-service
server.port = 8082

spring.datasource.url=jdbc:postgresql://localhost:5432/infra_urbana_usuarios
spring.datasource.username=admin
spring.datasource.password=password123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuracao Brevo (API HTTP de envio de e-mail transacional)
# Gerar chave em: brevo.com > SMTP & API > API Keys
brevo.api.key=${BREVO_API_KEY}
brevo.remetente.email=${BREVO_REMETENTE_EMAIL}
brevo.remetente.nome=${BREVO_REMETENTE_NOME:Infra Urbana}

# URL base da API (usada nos links de verificacao enviados por email)
app.url.base=${APP_BASE_URL:http://localhost:8082}
app.url.frontend=${FRONTEND_URL:http://localhost:3000}
