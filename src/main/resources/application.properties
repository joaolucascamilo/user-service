spring.application.name=user-service
server.port = 8082

spring.datasource.url=jdbc:postgresql://localhost:5432/infra_urbana_usuarios
spring.datasource.username=admin
spring.datasource.password=password123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuracao SMTP Gmail (use uma senha de app, nao a senha normal da conta)
# Para gerar: Conta Google > Seguranca > Verificacao em 2 etapas > Senhas de app
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_REMETENTE}
spring.mail.password=${EMAIL_SENHA_APP}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# URL base da API (usada nos links de verificacao enviados por email)
app.url.base=${APP_BASE_URL:http://localhost:8082}
